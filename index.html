<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COSMIC_BROTHERHOOD_FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        :root { --neon: #00ff41; --gold: #ffd700; --cyan: #00f2fe; --alert: #ff003c; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Fira Code', monospace; color: var(--neon); -webkit-tap-highlight-color: transparent; }
        #canvas-galaxy { position: fixed; top: 0; left: 0; z-index: -1; }

        .taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 45px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--neon); display: flex; align-items: center; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        .start-btn { background: var(--neon); color: #000; padding: 4px 12px; font-weight: bold; cursor: pointer; font-size: 0.75rem; border: none; }
        .clock { margin-left: auto; font-size: 0.75rem; color: #fff; font-weight: bold; }

        .desktop { padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; align-content: flex-start; height: calc(100vh - 50px); }
        .icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 85px; transition: 0.3s; text-align: center; }
        .icon:hover { transform: translateY(-5px); filter: drop-shadow(0 0 10px var(--cyan)); }
        .icon-img { font-size: 35px; margin-bottom: 5px; }
        .icon span { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .window { position: absolute; width: 320px; background: rgba(5, 15, 5, 0.95); border: 1px solid var(--neon); display: none; flex-direction: column; z-index: 10; box-shadow: 0 0 30px rgba(0,255,65,0.2); backdrop-filter: blur(10px); border-radius: 4px; }
        .window-header { background: var(--neon); color: #000; padding: 8px 12px; display: flex; justify-content: space-between; cursor: move; font-weight: bold; font-size: 0.8rem; }
        .window-body { padding: 20px; box-sizing: border-box; }
        
        @media (max-width: 600px) {
            .desktop { justify-content: space-around; }
            .window { width: 90vw !important; left: 5vw !important; top: 15vh !important; }
        }

        input { background: #000; border: 1px solid #333; color: var(--neon); padding: 12px; width: 100%; box-sizing: border-box; outline: none; font-family: inherit; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .btn-action { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 12px; cursor: pointer; width: 100%; font-weight: bold; font-family: inherit; margin-bottom: 10px; transition: 0.2s; }
        .btn-action:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-gift { border-color: var(--gold); color: var(--gold); }
        .btn-gift:hover { background: var(--gold); color: #000; }

        #convergence-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .hologram-card { border: 1px solid var(--cyan); padding: 30px; background: rgba(0, 15, 30, 0.9); width: 100%; max-width: 700px; box-shadow: 0 0 50px var(--cyan); transform: scale(0); transition: 0.5s; max-height: 85vh; overflow-y: auto; }
        .big-title { font-size: 2.5rem; margin: 0 0 20px 0; text-align: center; color: #fff; text-shadow: 0 0 15px var(--cyan); }
        
        .qr-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .qr-card { background: #fff; padding: 10px; border-radius: 8px; width: 280px; }
        .qr-card img { width: 100%; height: auto; display: block; }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <canvas id="canvas-galaxy"></canvas>

    <div class="desktop">
        <div class="icon" onclick="openWin('win-p')"><div class="icon-img">🐉</div><span>PHONG_v22</span></div>
        <div class="icon" onclick="openWin('win-t')"><div class="icon-img">🐯</div><span>THANH_v29</span></div>
        <div class="icon" id="icon-sys" onclick="openWin('win-sys')"><div class="icon-img">🪐</div><span>CORE_SYNC</span></div>
    </div>

    <div id="win-p" class="window" style="top:40px; left:20px;">
        <div class="window-header"><span>SECURE_AUTH: PHONG</span><span onclick="closeWin('win-p')" style="cursor:pointer">X</span></div>
        <div class="window-body">
            <p>> Nhập mã bảo mật Admin:</p>
            <input type="password" id="pass-p" placeholder="Enter Code...">
            <button class="btn-action" onclick="verify('p')">XÁC MINH</button>
            <button class="btn-action btn-gift" onclick="showQR('phong')">🧧 GỬI QUÀ</button>
            <div id="msg-p" style="font-size:0.7rem; min-height:1em;"></div>
        </div>
    </div>

    <div id="win-t" class="window" style="top:100px; left:80px;">
        <div class="window-header"><span>SECURE_AUTH: THANH</span><span onclick="closeWin('win-t')" style="cursor:pointer">X</span></div>
        <div class="window-body">
            <p>> Nhập mã bảo mật Admin:</p>
            <input type="password" id="pass-t" placeholder="Enter Code...">
            <button class="btn-action" onclick="verify('t')">XÁC MINH</button>
            <button class="btn-action btn-gift" onclick="showQR('thanh')">🧧 GỬI QUÀ</button>
            <div id="msg-t" style="font-size:0.7rem; min-height:1em;"></div>
        </div>
    </div>

    <div id="win-sys" class="window" style="top:250px; left:40px; width:300px;">
        <div class="window-header"><span>SYNC_CORE_MANAGER</span><span onclick="closeWin('win-sys')" style="cursor:pointer">X</span></div>
        <div class="window-body">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>PHONG_CORE:</span><span id="led-p" style="color:#200; font-size:1.2rem;">●</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>THANH_CORE:</span><span id="led-t" style="color:#200; font-size:1.2rem;">●</span></div>
            <button id="btn-merge" class="btn-action" style="display:none; color:var(--cyan); border-color:var(--cyan);" onclick="startConvergence()">[ KÍCH HOẠT HỢP NHẤT ]</button>
            <p id="hint" style="font-size:0.65rem; text-align:center; opacity:0.5;">[ CHỜ XÁC THỰC HAI BÊN ]</p>
        </div>
    </div>

    <div id="qr-modal" class="qr-overlay" onclick="this.style.display='none'">
        <p style="color:var(--gold); margin-bottom:15px; font-weight:bold;">QUÉT MÃ ĐỂ CHUYỂN QUÀ</p>
        <div class="qr-card"><img id="qr-img" src="" alt="QR"></div>
        <p style="color:#fff; margin-top:15px; font-size:0.7rem;">(Chạm bất kỳ để đóng)</p>
    </div>

    <div id="convergence-page">
        <div class="hologram-card" id="final-card">
            <h1 class="big-title">COSMIC MASTERS</h1>
            <div id="report-text" style="line-height:1.7; color:#fff; font-size:0.9rem;"></div>
            <button class="btn-action" onclick="location.reload()" style="margin-top:30px;">REBOOT SYSTEM</button>
        </div>
    </div>

    <div class="taskbar"><div class="start-btn" onclick="alert('Legends 2007 - Secure Connection')">START</div><div id="clock" class="clock">00:00:00</div></div>

    <script>
        const canvas = document.getElementById('canvas-galaxy'); const ctx = canvas.getContext('2d');
        let stars = []; function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Star { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.v = Math.random()*0.5 + 0.1; } draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, 7); ctx.fill(); } update() { this.y -= this.v; if(this.y < 0) this.y = canvas.height; } }
        for(let i=0; i<150; i++) stars.push(new Star()); function anim() { ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.update();s.draw();}); requestAnimationFrame(anim); } anim();

        const state = { p: false, t: false }; const keys = { p: "22042007", t: "29042007" };
        const qrs = { phong: "https://api.vietqr.io/image/970422-0799702346-K51S5Xg.jpg?accountName=HOANG%20DINH%20PHONG", thanh: "https://api.vietqr.io/image/970407-19074624939012-K51S5Xg.jpg?accountName=TRAN%20HUU%20THANH" };
        function openWin(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }
        function showQR(user) { document.getElementById('qr-img').src = qrs[user]; document.getElementById('qr-modal').style.display='flex'; }

        async function verify(user) {
            const music = document.getElementById('bg-music'); music.play().catch(() => {}); music.volume = 0.5;
            const val = document.getElementById(`pass-${user}`).value; const win = document.getElementById(`win-${user}`);
            if(val === keys[user]) {
                document.getElementById(`msg-${user}`).innerHTML = "<span style='color:var(--neon)'>> TRUY CẬP ĐƯỢC CHẤP NHẬN!</span>";
                state[user] = true; document.getElementById(`led-${user}`).style.color = "var(--neon)"; document.getElementById(`led-${user}`).style.textShadow = "0 0 10px var(--neon)";
                if(state.p && state.t) { document.getElementById('btn-merge').style.display = 'block'; document.getElementById('hint').style.display = 'none'; openWin('win-sys'); }
            } else { win.classList.add('shake'); setTimeout(()=>win.classList.remove('shake'), 300); document.getElementById(`msg-${user}`).innerHTML = "<span style='color:var(--alert)'>> SAI MẬT MÃ!</span>"; }
        }

        async function startConvergence() {
            const music = document.getElementById('bg-music'); if (music) music.volume = 1.0;
            const page = document.getElementById('convergence-page'); page.style.display = 'flex';
            
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const d = document.createElement('div'); d.style.position = 'fixed'; d.style.color = 'var(--gold)'; d.style.fontSize = '1.2rem'; d.style.zIndex = '10000'; d.innerText = "🐉_DRAGON_SYNC_INITIATED_"; d.style.top = Math.random()*100 + 'vh'; d.style.left = '-50%'; document.body.appendChild(d);
                    d.animate([{left:'-50%'}, {left:'150%'}], {duration:1500, easing: 'ease-in-out'}); setTimeout(() => d.remove(), 1500);
                }, i * 150);
            }

            await new Promise(r => setTimeout(r, 2000));
            document.getElementById('final-card').style.transform = 'scale(1)';
            
            const lines = [
                "<span style='color:var(--cyan)'>[ HỒ SƠ RỒNG: HOÀNG ĐÌNH PHÓNG ]</span>",
                "> Khởi tạo: 22/04/2007. Hệ: Phóng Hỏa.",
                "> Đánh giá: Chiến binh gánh team thực thụ, uy tín tuyệt đối.",
                "-----------------------------------------",
                "<span style='color:var(--cyan)'>[ HỒ SƠ HỔ: TRẦN HỮU THÀNH ]</span>",
                "> Khởi tạo: 29/04/2007. Hệ: Kiên Thành.",
                "> Đánh giá: Thủ lĩnh chiến lược, lầy lội và cực kỳ bản lĩnh.",
                "-----------------------------------------",
                "> <span style='color:var(--gold)'>TRẠNG THÁI BROTHERHOOD:</span> BẤT TỬ (100%)",
                "> Chúc 2 ông tuổi 19 rực rỡ, tiền đầy túi, gấu đầy tay!",
                "<br><center style='font-size:1.8rem; color:#fff; text-shadow: 0 0 10px var(--neon);'>HAPPY BIRTHDAY! 🎆</center>"
            ];

            const report = document.getElementById('report-text'); report.innerHTML = "";
            for(let l of lines) {
                const p = document.createElement('p'); p.innerHTML = l; p.style.margin = "5px 0"; report.appendChild(p);
                document.getElementById('final-card').scrollTop = document.getElementById('final-card').scrollHeight;
                await new Promise(r => setTimeout(r, 700));
            }

            setInterval(() => {
                confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00ff41', '#ffd700', '#00f2fe'] });
                confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00ff41', '#ffd700', '#00f2fe'] });
            }, 500);
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        if(window.innerWidth > 600) {
            document.querySelectorAll('.window-header').forEach(h => {
                h.onmousedown = (e) => {
                    let w=h.parentElement; let sx=e.clientX-w.offsetLeft, sy=e.clientY-w.offsetTop;
                    document.onmousemove=(e)=>{w.style.left=e.clientX-sx+'px'; w.style.top=e.clientY-sy+'px';};
                    document.onmouseup=()=>{document.onmousemove=null;};
                };
            });
        }
    </script>
</body>
</html>
